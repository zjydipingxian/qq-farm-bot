syntax = "proto3";

package gamepb.activitypb;

import "corepb.proto";

// ============ 活动服务 ============

// --- 活动组信息 (GroupInfo, 嵌套在 ActivityGroup.field 1) ---
message GroupInfo {
    int64 group_id = 1;
    int64 status = 3;
    string name = 4;
    int64 begin_time = 6;
    int64 end_time = 7;
    int64 sort_order = 8;
    int64 field_20 = 20;
}

// --- 活动内容 (嵌套在 ActivityItem.field 1) ---
message ActivityContent {
    int64 activity_id = 1;
    int64 group_id = 2;
    int64 type = 3;
    string name = 4;
    bytes extra = 5;
    int64 begin_time = 6;
    int64 end_time = 7;
    int64 sort_order = 8;
    int64 field_20 = 20;
    int64 field_23 = 23;
}

// --- 活动项 (ActivityItem, 嵌套在 ActivityGroup.field 2) ---
message ActivityItem {
    ActivityContent content = 1;
    bytes field_105 = 105;
}

// --- 活动组 (ActivityGroup, 嵌套在 GetGroupReply.field 1) ---
message ActivityGroup {
    GroupInfo info = 1;
    repeated ActivityItem activities = 2;
}

// --- 获取活动列表 ---
message ListRequest {}

message ListReply {
    repeated ActivityContent activities = 1;
}

// --- 获取活动组 ---
message GetGroupRequest {
    int64 group_id = 1;
}

message GetGroupReply {
    ActivityGroup group = 1;
}

// --- 活动操作 (参与/领取奖励) ---
message OperateRequest {
    int64 activity_id = 1;
    int32 operate_type = 2;     // 操作类型
    int64 param = 3;            // 附加参数
}

message OperateReply {
    int64 activity_id = 1;
    int64 result = 2;
    bytes data = 3;
    bytes rewards = 108;
}

// --- 活动变更通知 ---
message ActiviesChangeNotify {
    repeated ActivityContent activities = 1;
}
