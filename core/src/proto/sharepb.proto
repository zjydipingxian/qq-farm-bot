syntax = "proto3";

package gamepb.sharepb;

import "corepb.proto";

// ============ 分享服务 ============

// --- 检查是否可以分享 ---
message CheckCanShareRequest {}

message CheckCanShareReply {
    bool can_share = 1;  // 是否可以分享
}

// --- 报告分享 ---
message ReportShareRequest {
    bool shared = 1;  // 是否已分享
}

message ReportShareReply {
    bool success = 1;  // 是否成功
}

// --- 领取分享奖励 ---
message ClaimShareRewardRequest {
    bool claimed = 1;  // 请求领取
}

message ClaimShareRewardReply {
    bool success = 1;           // 是否成功
    bool has_reward = 2;        // 是否有奖励
    repeated corepb.Item items = 3;  // 奖励物品列表
}

// --- 获取邀请信息 ---
message GetInviteInfoRequest {
    int64 share_cfg_id = 1;
}

// 注意: InviteInfo 结构已大幅变更 (field 2 从 string 改为 int64,
// field 3/4 改为嵌套消息)，暂时无法完全逆向。
// 只保留 share_cfg_id，其他字段由 protobufjs 自动跳过。
message InviteInfo {
    int64 share_cfg_id = 1;
    // field 2-14 已变更，待后续逆向确认
}

message GetInviteInfoReply {
    repeated InviteInfo infos = 1;
}

// --- 领取邀请奖励 ---
message GetInviteAwardRequest {
    int64 share_cfg_id = 1;
}

message GetInviteAwardReply {
    bool success = 1;
    repeated corepb.Item items = 2;
}
