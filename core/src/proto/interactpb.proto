syntax = "proto3";

package gamepb.interactpb;

message InteractRecord {
    int64 server_time = 1;
    int32 action_type = 2;
    int64 visitor_gid = 3;
    string nick = 4;
    string avatar_url = 5;
    int32 crop_id = 6;
    int32 crop_count = 7;
    int32 times = 8;
    int32 from_type = 9;
    int32 level = 10;

    message Extra {
        int32 land_id = 1;
        int32 flag1 = 2;
        int32 flag2 = 3;
    }

    Extra extra = 11;
}

message InteractRecordsRequest {}

message InteractRecordsReply {
    repeated InteractRecord records = 1;
}

// --- 获取互动信息 ---
message InteractInfo {
    int64 visitor_gid = 1;
    string nick = 2;
    string avatar_url = 3;
    int32 action_type = 4;
    int64 server_time = 5;
    int32 crop_id = 6;
    int32 crop_count = 7;
    int32 level = 8;
}

message GetInteractInfoRequest {}

message GetInteractInfoReply {
    repeated InteractInfo infos = 1;
}

// --- 获取互动摘要 ---
message InteractSummary {
    int64 total_water = 1;
    int64 total_insecticide = 2;
    int64 total_weed = 3;
    int64 total_steal = 4;
    int64 total_stolen = 5;
    int64 visitor_count = 6;
}

message GetInteractSummaryRequest {}

message GetInteractSummaryReply {
    InteractSummary summary = 1;
}

// --- 关闭互动弹窗 ---
message DismissInteractPopupRequest {}

message DismissInteractPopupReply {}