syntax = "proto3";

package gamepb.solartermspb;

// ============ 节气系统 ============

// 节令奖励配置 (嵌套在 SolarTermInfo.field 5)
message SolarTermReward {
    int64 item_id = 1;             // 物品ID
    int64 count = 2;               // 数量
}

// 节气信息
message SolarTermInfo {
    int64 term_id = 1;             // 节气ID (101=端午, 102=夏至, 103=小暑)
    int64 status = 2;              // 状态
    int64 start_time = 3;          // 开始时间
    int64 end_time = 4;            // 结束时间
    repeated SolarTermReward rewards = 5;  // 节令奖励
    string name = 6;               // 节气名称
}

// --- 获取节气信息 ---
message GetSolarTermsRequest {}

message GetSolarTermsReply {
    repeated SolarTermInfo terms = 1;
    int64 server_time = 2;         // 服务器时间
    bytes config = 3;              // 活动配置 (JSON)
}

// --- 获取节气红点 ---
message GetSolarTermsRedDotRequest {}

message GetSolarTermsRedDotReply {
    bool has_red_dot = 1;          // 是否有红点
}
